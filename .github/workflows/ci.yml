name: Continuous Integration

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  install-lint-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Approve all build scripts
        run: pnpm approve-builds --all

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          PNPM_CONFIG_ONLY_BUILT_DEPENDENCIES_PRESET: all

      - name: Lint the code
        run: pnpm lint

      # - name: Analyze unused files and dependencies
      #   run: pnpm knip

      # - name: Run Prettier check
      #   run: pnpm format:check

      # - name: Install browsers
      #   run: pnpm test:browser:install

      # - name: Run tests
      #   run: pnpm test

      - name: Build the project
        run: pnpm build
