name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  install-lint-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Optimized caching & setup using the official pnpm action instead of npm -g
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10 # Force v10 or v11 depending on your lockfile

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      # Combined the approval into the install command to prevent frozen-lockfile mismatches
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --dangerously-allow-all-builds

      - name: Lint the code
        run: pnpm lint

      - name: Build the project
        run: pnpm build
